<!--  http://127.0.0.1:8080  -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wordle 2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #121213;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
      margin-bottom: 20px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
    }

    .cell {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #3a3a3c;
      font-size: 24px;
      text-transform: uppercase;
      font-weight: bold;
      background-color: #121213;
      color: white;
      cursor: default;
      perspective: 600px;
      transform-style: preserve-3d;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }

    .shake { animation: shake 0.4s; }

    @keyframes flip {
      0% {
        transform: rotateX(0deg);
        background-color: #121213;
        border-color: #3a3a3c;
      }
      50% {
        transform: rotateX(90deg);
        background-color: #121213;
        border-color: #3a3a3c;
      }
      51% {
        background-color: inherit;
        border-color: inherit;
      }
      100% {
        transform: rotateX(0deg);
        background-color: inherit;
        border-color: inherit;
        color: white;
      }
    }

    .flip {
      animation: flip 0.6s ease forwards;
    }

    .correct   { background-color: #6aaa64 !important; border-color: #6aaa64 !important; }
    .misplaced { background-color: #c9b458 !important; border-color: #c9b458 !important; }
    .incorrect { background-color: #787c7e !important; border-color: #787c7e !important; }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      max-width: 500px;
      margin-bottom: 10px;
    }

    .keyboard button {
      padding: 12px;
      font-size: 20px;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background-color: #818384;
      color: white;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .keyboard button:not(.correct):not(.misplaced):not(.incorrect):hover {
      background-color: #a1a2a4;
    }

    /* Enhanced yellow for misplaced letters */
    .keyboard .misplaced { 
      background-color: #b59f3b !important; 
      color: white !important;
    }

    /* Brighter green for correct letters */
    .keyboard .correct { 
      background-color: #538d4e !important; 
      color: white !important;
    }

    /* Darker for incorrect letters */
    .keyboard .incorrect { 
      background-color: #3a3a3c !important; 
      color: #666 !important;
      opacity: 1 !important;
    }

    #revealBtn, #playAgainBtn {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      color: white;
      display: none;
      perspective: 600px;
      transform-style: preserve-3d;
      min-width: 150px;
      height: 50px;
      transition: background-color 0.3s ease;
    }

    #revealBtn {
      background-color: #555;
    }

    #revealBtn:hover:not(:disabled) {
      background-color: #666;
    }

    #revealBtn:disabled {
      cursor: default;
      background-color: #6aaa64 !important;
    }

    #playAgainBtn {
      background-color: #538d4e;
      margin-left: 10px;
    }

    #playAgainBtn:hover {
      background-color: #6aaa64;
    }

    .button-container {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .message {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      min-height: 25px;
      text-align: center;
    }

    .win-message {
      color: #6aaa64;
    }

    .lose-message {
      color: #ff6b6b;
    }

    .special-message {
      color: #ffa500;
      animation: pulse 1.5s infinite;
    }

    .new-game-message {
      color: #6aaa64;
      animation: fadeInOut 2s ease;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(-10px); }
      20% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-10px); }
    }
  </style>
</head>

<body>
  <h1>Wordle 2</h1>
  <div class="board" id="board"></div>
  <div class="keyboard" id="keyboard"></div>
  
  <div class="button-container">
    <button id="revealBtn">Reveal Word</button>
    <button id="playAgainBtn">Play Again</button>
  </div>
  
  <div class="message" id="message"></div>

  <script>
    const API_BASE = "http://localhost:8080/game";
    const board = document.getElementById('board');
    const keyboard = document.getElementById('keyboard');
    const revealBtn = document.getElementById('revealBtn');
    const playAgainBtn = document.getElementById('playAgainBtn');
    const messageDiv = document.getElementById('message');
    const rows = 6;
    const cols = 6;
    let currentGuess = "";
    let guessesMade = 0;
    let isAnimating = false;
    let gameCompleted = false;
    let wordRevealed = false;
    const letterStatus = {};

    // Build board
    for (let r = 0; r < rows; r++) {
      const row = document.createElement('div');
      row.classList.add('row');
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.id = `cell-${r}-${c}`;
        row.appendChild(cell);
      }
      board.appendChild(row);
    }

    // Build keyboard with better color visibility
    const keys = 'QWERTYUIOPASDFGHJKLZXCVBNM'.split('');
    keys.forEach(key => {
      const button = document.createElement('button');
      button.textContent = key;
      button.setAttribute('data-key', key);
      button.style.color = 'white';
      button.addEventListener('click', () => handleKey(key));
      keyboard.appendChild(button);
    });

    const enterButton = document.createElement('button');
    enterButton.textContent = 'Enter';
    enterButton.style.gridColumn = 'span 2';
    enterButton.addEventListener('click', submitGuess);
    keyboard.appendChild(enterButton);

    const backspaceButton = document.createElement('button');
    backspaceButton.textContent = '←';
    backspaceButton.style.gridColumn = 'span 2';
    backspaceButton.addEventListener('click', () => handleKey('BACKSPACE'));
    keyboard.appendChild(backspaceButton);

    // Physical keyboard input
    document.addEventListener('keydown', (e) => {
      if (isAnimating || gameCompleted || wordRevealed) return;
      
      if (e.key === 'Enter') {
        submitGuess();
      } else if (e.key === 'Backspace') {
        handleKey('BACKSPACE');
      } else if (/^[a-zA-Z]$/.test(e.key)) {
        handleKey(e.key.toUpperCase());
      }
    });

    function handleKey(key) {
      if (isAnimating || gameCompleted || wordRevealed) return;
      
      if (key === 'BACKSPACE') {
        currentGuess = currentGuess.slice(0, -1);
      } else if (currentGuess.length < cols) {
        currentGuess += key;
      }
      updateCurrentRow();
    }

    function updateCurrentRow() {
      for (let i = 0; i < cols; i++) {
        const cell = document.getElementById(`cell-${guessesMade}-${i}`);
        cell.textContent = currentGuess[i] ? currentGuess[i].toUpperCase() : '';
      }
    }

    async function submitGuess() {
      if (isAnimating || gameCompleted || wordRevealed) return;
      if (currentGuess.length !== cols) return;
      
      isAnimating = true;
      
      try {
        // Check for special guess patterns
        const guessLower = currentGuess.toLowerCase();
        if (guessLower === 'qwerty' || guessLower === 'abcdef') {
          alert("idiot");
          await shakeCurrentRow();
          currentGuess = "";
          updateCurrentRow();
          isAnimating = false;
          return;
        }
        
        const res = await fetch(`${API_BASE}/guess`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ guess: currentGuess })
        });
        const data = await res.json();
        
        if (data.feedback.length === 1 && data.feedback[0].startsWith("Invalid guess")) {
          await shakeCurrentRow();
          isAnimating = false;
        } else {
          const isCorrect = data.feedback.every(f => f.toLowerCase().trim() === 'correct');
          
          await displayGuess(data.guess, data.feedback);
          currentGuess = "";
          guessesMade++;
          
          // Show reveal button after 3 attempts
          if (guessesMade >= 3 && !gameCompleted && !wordRevealed) {
            revealBtn.style.display = 'block';
          }
          
          // Check for game completion
          if (isCorrect) {
            gameCompleted = true;
          //  showMessage("Congratulations! You guessed the word!", "win-message"); 
            playAgainBtn.style.display = 'block';
            revealBtn.style.display = 'none'; // Hide reveal button when player wins
          } else if (guessesMade >= rows) {
            gameCompleted = true;
           // showMessage("Game Over! Try again!", "lose-message");
            playAgainBtn.style.display = 'block';
            if (guessesMade >= 3 && !wordRevealed) {
              revealBtn.style.display = 'block';
            }
          }
          
          isAnimating = false;
        }
      } catch (err) {
        console.error(err);
        isAnimating = false;
      }
    }

    function shakeCurrentRow() {
      return new Promise((resolve) => {
        let animationsCompleted = 0;
        
        for (let i = 0; i < cols; i++) {
          const cell = document.getElementById(`cell-${guessesMade}-${i}`);
          if (!cell) {
            animationsCompleted++;
            continue;
          }
          
          cell.classList.add('shake');
          cell.addEventListener('animationend', function handler() {
            cell.classList.remove('shake');
            cell.removeEventListener('animationend', handler);
            animationsCompleted++;
            if (animationsCompleted === cols) {
              resolve();
            }
          });
        }
      });
    }

    function displayGuess(guess, feedback) {
      return new Promise((resolve) => {
        const row = guessesMade;
        let animationsCompleted = 0;
        
        for (let i = 0; i < cols; i++) {
          setTimeout(() => {
            const cell = document.getElementById(`cell-${row}-${i}`);
            if (!cell) {
              animationsCompleted++;
              if (animationsCompleted === cols) resolve();
              return;
            }
            
            const letter = guess[i].toUpperCase();
            const status = feedback[i]?.toLowerCase()?.trim() || 'incorrect';
            
            // Pre-set the color class so the flip animation can transition to it
            cell.classList.add(status);
            cell.classList.add('flip');
            
            // Update the cell content mid-flip
            setTimeout(() => {
              cell.textContent = letter;
            }, 300); // Halfway through the flip
            
            cell.addEventListener('animationend', function handler() {
              cell.classList.remove('flip');
              cell.removeEventListener('animationend', handler);
              
              // Update keyboard state with improved colors
              const keyButton = document.querySelector(`.keyboard button[data-key="${letter}"]`);
              if (keyButton) {
                const currentStatus = letterStatus[letter] || '';
                // Priority: correct > misplaced > incorrect
                if (status === 'correct') {
                  letterStatus[letter] = 'correct';
                  keyButton.classList.remove('misplaced', 'incorrect');
                  keyButton.classList.add('correct');
                } else if (status === 'misplaced' && currentStatus !== 'correct') {
                  letterStatus[letter] = 'misplaced';
                  keyButton.classList.remove('incorrect');
                  keyButton.classList.add('misplaced');
                } else if (status === 'incorrect' && !currentStatus) {
                  letterStatus[letter] = 'incorrect';
                  keyButton.classList.add('incorrect');
                }
              }
              
              animationsCompleted++;
              if (animationsCompleted === cols) {
                resolve();
              }
            }, { once: true });
          }, i * 300);
        }
      });
    }

    // Reveal target word button - now flips to show the word
    revealBtn.addEventListener('click', async () => {
      if (isAnimating || wordRevealed) return;
      
      try {
        const res = await fetch(`${API_BASE}/target`);
        const text = await res.text();
        
        // Set game state
        gameCompleted = true;
        wordRevealed = true;
        
        // Disable the button first
        revealBtn.disabled = true;
        
        // Add flip animation class
        revealBtn.classList.add('flip');
        
        // Change the button text and background halfway through the flip
        setTimeout(() => {
          revealBtn.textContent = text.toUpperCase();
          revealBtn.style.backgroundColor = '#6aaa64';
        }, 300); // Halfway through the flip animation
        
        // Remove flip class after animation completes and show play again button
        revealBtn.addEventListener('animationend', function handler() {
          revealBtn.classList.remove('flip');
          revealBtn.removeEventListener('animationend', handler);
          
          // Show message and play again button
        //  showMessage(`The word was ${text.toUpperCase()}`, "lose-message");
          playAgainBtn.style.display = 'block';
        }, { once: true });
        
      } catch (err) {
        console.error(err);
      }
    });

    // Play Again button - resets the game and gets a new word from backend
    playAgainBtn.addEventListener('click', async () => {
      if (isAnimating) return;
      
      isAnimating = true;
      
      try {
        // Show new game message
        // showMessage("Picking new word", "new-game-message");
        
        // Reset the game state
        gameCompleted = false;
        wordRevealed = false;
        currentGuess = "";
        guessesMade = 0;
        
        // Clear the board with a fade-out effect
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const cell = document.getElementById(`cell-${r}-${c}`);
            cell.textContent = "";
            cell.classList.remove('correct', 'misplaced', 'incorrect', 'flip', 'shake');
            cell.style.backgroundColor = '#121213';
            cell.style.borderColor = '#3a3a3c';
            cell.style.opacity = '0.7';
            
            // Fade in effect
            setTimeout(() => {
              cell.style.transition = 'opacity 0.3s ease';
              cell.style.opacity = '1';
            }, 50 * (r + c));
          }
        }
        
        // Clear the keyboard
        document.querySelectorAll('.keyboard button[data-key]').forEach(button => {
          button.classList.remove('correct', 'misplaced', 'incorrect');
          button.style.transition = 'all 0.3s ease';
          button.style.opacity = '0.7';
          setTimeout(() => {
            button.style.opacity = '1';
          }, 300);
        });
        
        // Clear letter status
        Object.keys(letterStatus).forEach(key => delete letterStatus[key]);
        
        // Reset reveal button
        revealBtn.textContent = 'Reveal Word';
        revealBtn.style.backgroundColor = '#555';
        revealBtn.disabled = false;
        revealBtn.style.display = 'none';
        revealBtn.classList.remove('flip');
        
        // Hide buttons and messages
        playAgainBtn.style.display = 'none';
        
        // Start new game by calling the backend /start endpoint
        await fetch(`${API_BASE}/start`);
        
        // Clear message after delay
        setTimeout(() => {
          messageDiv.textContent = '';
          messageDiv.className = 'message';
        }, 2000);
        
        isAnimating = false;
      } catch (err) {
        console.error(err);
        showMessage("Error starting new game. Please try again.", "lose-message");
        isAnimating = false;
      }
    });

    function showMessage(text, className) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${className}`;
    }

    async function startGame() {
      try { 
        await fetch(`${API_BASE}/start`); 
      }
      catch (err) { 
        console.error(err); 
      }
    }

    startGame();
  </script>
</body>
</html>
